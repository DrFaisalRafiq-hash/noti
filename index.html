    <style>
      /* Brand splash — paints instantly, before React mounts. */
      #noti-splash {
        position: fixed; inset: 0; z-index: 2147483647;
        display: flex; align-items: center; justify-content: center;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        background:
          radial-gradient(120% 80% at 30% 20%, rgba(255,255,255,0.08), transparent 60%),
          radial-gradient(100% 70% at 75% 85%, rgba(0,0,0,0.35), transparent 65%),
          #1a1a18;
        opacity: 1;
        transition: opacity 360ms ease-out;
        -webkit-tap-highlight-color: transparent;
        overflow: hidden;
      }
      #noti-splash.noti-splash-hide { opacity: 0; pointer-events: none; }

      .noti-stage {
        position: relative;
        /* Size by the smaller axis so the mark stays square in any orientation. */
        width: min(60vmin, 320px);
        aspect-ratio: 1 / 1;
        display: flex; align-items: center; justify-content: center;
      }

      /* Squircle background — gradient + gloss + rim */
      .noti-squircle {
        position: absolute; inset: 0;
        border-radius: 21%;
        overflow: hidden;
        opacity: 0;
        transform: scale(0.8);
        animation: noti-squircle-in 0.7s cubic-bezier(.34,1.56,.64,1) 0.1s forwards;
        background:
          radial-gradient(ellipse 110% 66% at 50% 32%, rgba(255,255,255,0.06) 0%, transparent 100%),
          linear-gradient(180deg, rgba(255,255,255,0.11) 0%, rgba(255,255,255,0) 45%),
          linear-gradient(180deg, #4e4e48 0%, #2e2e2a 100%);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.10),
          inset 0 -1px 0 rgba(0,0,0,0.35),
          0 30px 80px rgba(0,0,0,0.55);
      }
      @keyframes noti-squircle-in {
        0%   { opacity: 0; transform: scale(0.82); }
        100% { opacity: 1; transform: scale(1); }
      }

      /* Pulse rings around squircle */
      .noti-pulse {
        position: absolute; inset: 0;
        border-radius: 21%;
        border: 2px solid rgba(155,155,145,0.5);
        opacity: 0;
        animation: noti-pulse 1.6s ease-out 1.9s;
      }
      .noti-pulse:nth-of-type(2) { animation-delay: 2.15s; }
      .noti-pulse:nth-of-type(3) { animation-delay: 2.4s; }
      @keyframes noti-pulse {
        0%   { transform: scale(0.96); opacity: 1; border-color: rgba(155,155,145,0.55); }
        100% { transform: scale(1.32); opacity: 0; border-color: rgba(155,155,145,0); }
      }

      /* SVG glyph layer */
      .noti-svg {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
      }

      /* The "n" — draws in, then fills */
      .noti-n {
        fill: rgba(255,255,255,0.95);
        stroke: rgba(255,255,255,0.65);
        stroke-width: 6;
        stroke-dasharray: 4200;
        stroke-dashoffset: 4200;
        fill-opacity: 0;
        animation:
          noti-draw 1.3s cubic-bezier(.65,0,.35,1) 0.5s forwards,
          noti-fill 0.5s ease-out 1.6s forwards;
      }
      @keyframes noti-draw { to { stroke-dashoffset: 0; } }
      @keyframes noti-fill { to { fill-opacity: 1; } }

      /* Bell — stamps in, then rings */
      .noti-bell {
        opacity: 0;
        transform-origin: 610px 295px;
        animation:
          noti-bell-stamp 0.45s cubic-bezier(.34,1.56,.64,1) 1.85s forwards,
          noti-bell-ring 0.6s ease-in-out 2.4s;
      }
      @keyframes noti-bell-stamp {
        0%   { opacity: 0; transform: scale(1.6) translateY(-12px); }
        60%  { opacity: 1; transform: scale(0.95); }
        100% { opacity: 1; transform: scale(1); }
      }
      @keyframes noti-bell-ring {
        0%, 100% { transform: rotate(0deg); }
        15% { transform: rotate(12deg); }
        30% { transform: rotate(-10deg); }
        45% { transform: rotate(8deg); }
        60% { transform: rotate(-5deg); }
        75% { transform: rotate(2deg); }
      }

      @media (prefers-reduced-motion: reduce) {
        #noti-splash, .noti-squircle, .noti-pulse, .noti-n, .noti-bell {
          transition: none !important;
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
          stroke-dashoffset: 0 !important;
          fill-opacity: 1 !important;
        }
      }
